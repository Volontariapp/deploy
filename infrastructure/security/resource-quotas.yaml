apiVersion: v1
kind: ResourceQuota
metadata:
  name: dev-quota
  namespace: dev
spec:
  hard:
    requests.memory: "4Gi"
    limits.memory: "6Gi"
    requests.cpu: "2"
    limits.cpu: "4"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-quota
  namespace: prod
spec:
  hard:
    requests.memory: "6Gi"
    limits.memory: "10Gi"
    requests.cpu: "4"
    limits.cpu: "8"

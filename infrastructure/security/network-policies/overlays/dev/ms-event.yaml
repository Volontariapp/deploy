apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ms-event-policy
  namespace: dev
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - ms-event
          - post-processor-event
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - api-gateway
                  - worker-event
                  - worker-social
                  - worker-post
                  - worker-user
                  - ms-event
                  - ms-post
                  - ms-social
                  - ms-user
                  - ws-service
                  - post-processor-event
                  - post-processor-post
                  - post-processor-social
                  - post-processor-user
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - ms-event
                  - ms-post
                  - ms-social
                  - ms-user
                  - ws-service
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: ms-event-db
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: redis
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80

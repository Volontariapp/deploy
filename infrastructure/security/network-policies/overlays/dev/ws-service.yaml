apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ws-service-policy
  namespace: dev
spec:
  podSelector:
    matchLabels:
      app: ws-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
        - podSelector:
            matchLabels:
              app: ws-service
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - api-gateway
                  - worker-user
                  - worker-post
                  - worker-social
                  - worker-event
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - ms-event
                  - ms-post
                  - ms-social
                  - ms-user
                  - post-processor-event
                  - post-processor-post
                  - post-processor-social
                  - post-processor-user
                  - worker-user
                  - worker-post
                  - worker-social
                  - worker-event
  egress:
    - to:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - ms-event
                  - ms-post
                  - ms-social
                  - ms-user
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: ws-service
        - podSelector:
            matchLabels:
              app: ws-service-redis
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: redis
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ws-service-redis-policy
  namespace: dev
spec:
  podSelector:
    matchLabels:
      app: ws-service-redis
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ws-service
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

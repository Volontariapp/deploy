apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: runners-policy
  namespace: dev
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - outbox-user
          - worker-user
          - outbox-post
          - worker-post
          - outbox-event
          - worker-event
          - outbox-social
          - worker-social
          - post-processor-user
          - post-processor-post
          - post-processor-event
          - post-processor-social
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Diagnostic /health endpoints for workers, outbox runners (user/post/
    # event/social) and post-processors.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 4101
        - protocol: TCP
          port: 4102
        - protocol: TCP
          port: 4103
        - protocol: TCP
          port: 4104
        - protocol: TCP
          port: 4105
        - protocol: TCP
          port: 4202
        - protocol: TCP
          port: 4203
        - protocol: TCP
          port: 4204
        - protocol: TCP
          port: 4205
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: redis
        - podSelector:
            matchLabels:
              app: neo4j
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - api-gateway
                  - ms-user
                  - ms-post
                  - ms-social
                  - ms-event
                  - ws-service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ms-user-policy
  namespace: prod
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - ms-user
          - post-processor-user
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: ms-user-db
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: redis
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

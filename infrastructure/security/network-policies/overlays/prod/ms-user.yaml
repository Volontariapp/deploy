apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ms-user-policy
  namespace: prod
spec:
  podSelector:
    matchLabels:
      app: ms-user
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ms-user-db
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: traefik
    # No serversscheme annotation: argocd-server --insecure listens on HTTP only
spec:
  tls:
    - hosts:
        - argo.cyrus-ag.com
        - volontariapp-argocd.cyrus-ag.com
      # secretName omitted: Traefik uses its default cert.
      # cloudflared has noTLSVerify=ON so this is fine.
  rules:
    - host: argo.cyrus-ag.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80   # Service port 80 → targetPort 8080 (HTTP)
    - host: volontariapp-argocd.cyrus-ag.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80   # Service port 80 → targetPort 8080 (HTTP)

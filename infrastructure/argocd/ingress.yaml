# IngressRoute CRD gives direct Traefik control — avoids the phantom
# "traefik-security-headers@kuberdns" middleware that Traefik was injecting
# on standard Kubernetes Ingress resources.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`volontariapp-argocd.cyrus-ag.com`) || Host(`argo.cyrus-ag.com`)
      kind: Rule
      services:
        - name: argocd-server
          port: 80
  tls:
    secretName: argocd-server-tls

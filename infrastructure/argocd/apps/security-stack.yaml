apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:Volontariapp/deploy.git
    path: infrastructure/security
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system # On déploie globalement
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

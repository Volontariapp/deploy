apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-databases
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dev-project
  source:
    repoURL: https://github.com/Volontariapp/deploy.git
    path: infrastructure/databases/overlays/dev
    targetRevision: HEAD
    kustomize:
      buildOptions: "--enable-helm"
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  # syncPolicy:
  #   automated:
  #     prune: true
  #     selfHeal: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/externalTrafficPolicy
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates

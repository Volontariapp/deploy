apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-databases
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: dev-project
  source:
    repoURL: git@github.com:Volontariapp/deploy.git
    path: infrastructure/databases/overlays/dev
    targetRevision: HEAD
    kustomize:
      buildOptions: "--enable-helm"
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Volontariapp/deploy.git
    path: infrastructure/monitoring/overlays/prod
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-ms-event
  namespace: argocd
spec:
  project: prod-project
  source:
    repoURL: https://github.com/Volontariapp/deploy.git
    path: apps/overlays/prod/ms-event
    targetRevision: de1ef075164e54a6b2d2137210952a107c910c6f
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

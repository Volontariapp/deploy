apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-event
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-event
  template:
    metadata:
      labels:
        app: ms-event
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-login
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', "until nc -zv ms-event-db-postgresql 5432; do echo waiting for postgres; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
        - name: run-migrations
          image: ghcr.io/volontariapp/ms-event:latest
          imagePullPolicy: Always
          command:
            [
              'node',
              'node_modules/typeorm/cli.js',
              'migration:run',
              '-d',
              'dist/config/data-source.js',
            ]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "ms-event-db-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "ms-event"
            - name: DB_USERNAME
              value: "ms-event"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: ms-event-password
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      containers:
        - name: ms-event
          image: ghcr.io/volontariapp/ms-event:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3003
              name: http
          env:
            - name: OTEL_SDK_DISABLED
              value: "true"
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3003"
            - name: DB_HOST
              value: "ms-event-db-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "ms-event"
            - name: DB_USERNAME
              value: "ms-event"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: ms-event-password
            - name: MS_USER_URL
              value: "ms-user:3000"
            - name: MS_POST_URL
              value: "ms-post:3000"
            - name: MS_EVENT_URL
              value: "0.0.0.0:3000"
            - name: MS_SOCIAL_URL
              value: "ms-social:3000"
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: tmp-volume
          emptyDir: {}

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - deployment-outbox.yaml
  - deployment-post-processor.yaml
  - deployment-worker.yaml
  - service-worker.yaml
  - service-post-processor.yaml
  - service-outbox.yaml

patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /spec/revisionHistoryLimit
        value: 2

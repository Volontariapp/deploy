apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-social
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-social
  template:
    metadata:
      labels:
        app: ms-social
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-login
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -zv ms-social-db-postgresql 5432; do echo waiting for postgres; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
        - name: run-migrations
          image: ghcr.io/volontariapp/ms-social:sha-af4985e
          imagePullPolicy: Always
          command: ['node', 'node_modules/typeorm/cli.js', 'migration:run', '-d', 'dist/config/data-source.js']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "ms-social-db-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "ms-social"
            - name: DB_USERNAME
              value: "ms-social"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: ms-social-password
            - name: NEO4J_HOST
              value: 'neo4j'
            - name: NEO4J_PORT
              value: '7687'
            - name: NEO4J_USERNAME
              value: 'neo4j'
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: neo4j-password
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
        - name: wait-for-neo4j
          image: busybox:1.28
          command: ['sh', '-c', 'until nc -zv neo4j 7687; do echo waiting for neo4j; sleep 2; done']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 50m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
      containers:
        - name: ms-social
          image: ghcr.io/volontariapp/ms-social:sha-af4985e
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            runAsNonRoot: true
            runAsUser: 1001
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3004
              name: http
          env:
            - name: OTEL_SDK_DISABLED
              value: 'true'
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '3004'
            - name: DB_HOST
              value: 'ms-social-db-postgresql'
            - name: DB_PORT
              value: '5432'
            - name: DB_NAME
              value: 'ms-social'
            - name: DB_USERNAME
              value: 'ms-social'
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: ms-social-password
            - name: MS_USER_URL
              value: 'ms-user:80'
            - name: MS_POST_URL
              value: 'ms-post:80'
            - name: MS_EVENT_URL
              value: 'ms-event:80'
            - name: MS_SOCIAL_URL
              value: '0.0.0.0:3000'
            - name: NEO4J_HOST
              value: 'neo4j'
            - name: NEO4J_PORT
              value: '7687'
            - name: NEO4J_USERNAME
              value: 'neo4j'
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: neo4j-password
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: certs-volume
              mountPath: /app/certs
              readOnly: true
      volumes:
        - name: certs-volume
          secret:
            secretName: auth-certs
        - name: tmp-volume
          emptyDir: {}

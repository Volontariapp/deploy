apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-social
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-social
  template:
    metadata:
      labels:
        app: ms-social
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: ms-social
          image: volontariapp/ms-social:latest # À écraser par SHA dans l'overlay
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "ms-social-db-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "ms-social"
            - name: DB_USER
              value: "ms-social"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: ms-social-password
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

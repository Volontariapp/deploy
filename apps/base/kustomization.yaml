apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ms-user/
  - ms-post/
  - ms-event/
  - ms-social/

patches:
  - target:
      kind: Deployment
      labelSelector: 'app in (ms-user, ms-post, ms-event, ms-social)'
    patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value: [{name: ghcr-login}]
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          runAsUser: 1001
          fsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1001
          readOnlyRootFilesystem: true
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: tmp-volume
          mountPath: /tmp
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: tmp-volume
          emptyDir: {}

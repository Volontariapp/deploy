apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        fsGroup: 7474
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 7474
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: NEO4J_TEMP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: neo4j-password
          command:
            - "/bin/bash"
            - "-c"
            - "export NEO4J_AUTH=neo4j/$NEO4J_TEMP_PASSWORD && /startup/docker-entrypoint.sh neo4j"

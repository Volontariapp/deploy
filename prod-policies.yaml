apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-policy
  namespace: prod
spec:
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: ms-user
    - podSelector:
        matchLabels:
          app: ms-post
    - podSelector:
        matchLabels:
          app: ms-social
    - podSelector:
        matchLabels:
          app: ms-event
    - podSelector:
        matchLabels:
          app: ws-service
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: prod
spec:
  egress:
  - ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
    to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ms-event-policy
  namespace: prod
spec:
  egress:
  - to:
    - podSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - ms-event
          - ms-post
          - ms-social
          - ms-user
          - ws-service
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/instance: ms-event-db
    - podSelector:
        matchLabels:
          app.kubernetes.io/instance: redis
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
  - ports:
    - port: 443
      protocol: TCP
    - port: 80
      protocol: TCP
    to:
    - ipBlock:
        cidr: 0.0.0.0/0
  ingress:
  - from:
    - podSelector:
        matchExpressions:
        - key: app
          operator: In
          values:
          - api-gateway
          - worker-event
          - worker-social
          - worker-post
          - worker-user
          - ms-event
          - ms-post
          - ms-social
          - ms-user
          - ws-service
          - post-processor-event
          - post-processor-post
          - post-processor-social
          - post-processor-user
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - ms-event
      - post-processor-event
  policyTypes:
  - Ingress
  - Egress
